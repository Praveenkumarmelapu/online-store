services:
  # Backend Service (Django)
  - type: web
    name: snackstore-backend
    env: python
    buildCommand: ./backend/build.sh
    startCommand: cd backend && gunicorn config.wsgi
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: snackstore-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "snackstore-backend.onrender.com" # Update this after first deploy
      - key: CORS_ALLOWED_ORIGINS
        value: "https://snackstore.onrender.com" # Update this after first deploy

  # Frontend Service (Vite Static Site)
  - type: web
    name: snackstore-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    publishDir: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: "https://snackstore-backend.onrender.com" # Update this after first deploy
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: snackstore-db
    plan: free
