services:
  # 1. Backend Service (Django)
  - type: web
    name: snackstore-backend
    env: python
    buildCommand: ./backend/build.sh
    startCommand: cd backend && gunicorn config.wsgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: snackstore-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://snackstore-frontend.onrender.com,https://snackstore-admin.onrender.com"

  # 2. Storefront Service (React Static Site)
  - type: static
    name: snackstore-frontend
    env: node
    buildCommand: cd frontend && npm install && npm run build
    publishDir: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: "https://snackstore-backend.onrender.com/api"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # 3. Admin Panel Service (React Static Site)
  - type: static
    name: snackstore-admin
    env: node
    buildCommand: cd admin-frontend && npm install && npm run build
    publishDir: admin-frontend/dist
    envVars:
      - key: VITE_API_URL
        value: "https://snackstore-backend.onrender.com/api"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: snackstore-db
    plan: free
