version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: snackstore
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      - DEBUG=0
      - DATABASE_URL=postgres://postgres:postgres123@db:5432/snackstore
    depends_on:
      - db
    ports:
      - "8000:8000"
    volumes:
      - media_data:/app/media

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data:
  media_data:
